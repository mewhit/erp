# fly.toml app configuration file generated for erp-vbwyww on 2026-06-10T20:30:10Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'erp-vbwyww'
primary_region = 'yyz'
kill_signal = 'SIGTERM'
kill_timeout = '30s'

[build]
  dockerfile = 'Dockerfile'

  [build.args]
    VITE_API_BASE_URL = 'https://erp-api.mewhit.com'

[env]
  NODE_ENV = 'production'
  PORT = '3000'
  API_CLIENT_BASE_URL = 'http://127.0.0.1:3000'
  API_UPSTREAM = '127.0.0.1:3000'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 200
    soft_limit = 100

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '15s'
    method = 'GET'
    path = '/health-check'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
